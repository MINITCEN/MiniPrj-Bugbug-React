<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>버그버그 - 리뷰 목록</title>
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .data-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .meta { margin: 4px 0; color: #666; font-size: 14px; }
        .rating { color: #ff9800; font-weight: bold; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        button { padding: 5px 15px; cursor: pointer; }
        button:disabled { background-color: #eee; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>리뷰 목록</h1>
    <a href="/mypage/dashboard">대시보드로 돌아가기</a>
    <hr>

    <div id="list-container">
        <p>데이터를 불러오는 중입니다...</p>
    </div>

    <div class="pagination">
        <button id="prev-btn" onclick="loadPage(currentPage - 1)">이전</button>
        <span id="page-info">1 페이지</span>
        <button id="next-btn" onclick="loadPage(currentPage + 1)">다음</button>
    </div>
</div>

<script>
    let currentPage = 0;

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function formatDate(value) {
        return value ? String(value).replace("T", " ").slice(0, 16) : "";
    }

    function loadPage(page) {
        fetch(`/api/mypage/reviews?page=${page}`)
            .then(res => res.json())
            .then(data => {
                const listContainer = document.getElementById("list-container");
                listContainer.innerHTML = "";

                if (!data.content || data.content.length === 0) {
                    listContainer.innerHTML = "<p>표시할 리뷰가 없습니다.</p>";
                } else {
                    data.content.forEach(review => {
                        listContainer.innerHTML += `
                            <div class="data-card">
                                <h3>${escapeHtml(review.requestTitle || "의뢰")}</h3>
                                <p class="meta">의뢰인: ${escapeHtml(review.userName)} | 헌터: ${escapeHtml(review.hunterName)}</p>
                                <p class="meta">작성일: ${escapeHtml(formatDate(review.createdAt))}</p>
                                <p class="rating">별점 ${Math.round(Number(review.rating || 0))} / 5</p>
                                <p>${escapeHtml(review.content)}</p>
                            </div>
                        `;
                    });
                }

                currentPage = data.number;
                document.getElementById("page-info").innerText = `${currentPage + 1} / ${data.totalPages === 0 ? 1 : data.totalPages} 페이지`;
                document.getElementById("prev-btn").disabled = data.first;
                document.getElementById("next-btn").disabled = data.last;
            });
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadPage(0);
    });
</script>

</body>
</html>
