<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="siteHeader(activePage)" class="site-header">
    <div class="site-header__inner">
        <a href="/" class="site-header__brand" aria-label="버그버그 홈">
            <img class="site-header__brand-badge" src="/image/favicon.svg" alt="버그버그 로고" aria-hidden="true" style="background: none; padding: 0; border: none; width: 36px; height: 36px; border-radius: 8px; display: inline-block;">
            <span class="site-header__brand-text">버그버그</span>
        </a>

        <nav class="site-header__nav" aria-label="주요 메뉴">
            <a href="/service-intro"
               class="site-header__nav-link"
               th:classappend="${activePage == 'service-intro'} ? ' is-active' : ''">서비스 소개</a>
            <a href="/hunter"
               class="site-header__nav-link"
               th:classappend="${activePage == 'hunter'} ? ' is-active' : ''">헌터 찾기</a>
            <a href="/mosquito-map"
               class="site-header__nav-link"
               th:classappend="${activePage == 'mosquito-map'} ? ' is-active' : ''">모기지수 지도</a>
            <a href="/requestView/list"
               class="site-header__nav-link"
               th:classappend="${activePage == 'request'} ? ' is-active' : ''">의뢰 게시판</a>

            <a href="/admin/users"
               class="site-header__nav-link"
               sec:authorize="hasRole('ADMIN')"
               th:classappend="${activePage == 'admin'} ? ' is-active' : ''"
               style="color: var(--shell-brand);">관리자 대시보드</a>
        </nav>

        <div class="site-header__actions">
            <a href="/mypage"
               class="site-header__icon-button"
               aria-label="마이페이지"
               sec:authorize="hasAnyRole('USER', 'HUNTER')"
               style="overflow: hidden; padding: 0;">
                <img src="/image/mypage_logo.png" alt="마이페이지 로고" aria-hidden="true" style="width: 100%; height: 100%; object-fit: cover; border: none; display: block;">
            </a>
            <div sec:authorize="isAuthenticated()" class="site-header__session">
                <span class="site-header__welcome" sec:authentication="principal.nickname">사용자</span>
                <button type="button" class="site-header__ghost-button js-logout-button">로그아웃</button>
            </div>
            <div sec:authorize="isAnonymous()" class="site-header__session">
                <a href="/login" class="site-header__ghost-button">로그인</a>
                <a href="/signup" class="site-header__solid-button">회원가입</a>
            </div>
        </div>
    </div>
</header>

<!-- 모바일 전용 바텀 네비게이션 자동 내장 (하이브리드 앱 대응) -->
<nav th:replace="~{fragments/bottom-nav :: mobileBottomNav(activePage)}"></nav>
</body>
</html>
