<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket Chat Test</title>
    <!-- SockJS and STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        .chat-media { max-width: 200px; max-height: 200px; display: block; margin-top: 5px; }
        .message-box { margin-bottom: 10px; padding: 5px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <h2>웹소켓 실시간 채팅 + 파일 전송 테스트</h2>
    
    <div>
        <label>채팅방 번호 (Room ID): </label>
        <input type="text" id="roomId" value="1">
        <label>내 유저 번호 (Sender ID): </label>
        <input type="text" id="senderId" value="1">
        <button onclick="connect()">연결하기 (입장)</button>
        <button onclick="disconnect()">연결 끊기</button>
    </div>
    
    <br>
    
    <!-- 텍스트 전송 -->
    <div style="margin-bottom: 10px;">
        <input type="text" id="message" placeholder="보낼 텍스트 메시지 입력">
        <button onclick="sendMessage()">텍스트 전송</button>
    </div>

    <!-- 파일 전송 (사진, 영상, 음성) -->
    <div style="background-color: #f9f9f9; padding: 10px; border: 1px solid #ddd;">
        <strong>파일 전송:</strong>
        <select id="fileType">
            <option value="IMAGE">사진 (IMAGE)</option>
            <option value="VIDEO">동영상 (VIDEO)</option>
            <option value="AUDIO">음성 (AUDIO)</option>
        </select>
        <input type="file" id="fileInput">
        <button onclick="sendFile()">파일 전송</button>
    </div>

    <hr>
    
    <div id="chat-box">
        <!-- 메시지가 여기에 표시됩니다 -->
    </div>

    <script>
        let stompClient = null;
        let currentRoomId = null;

        function connect() {
            currentRoomId = document.getElementById('roomId').value;
            const socket = new SockJS('http://localhost:8080/ws/chats');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                document.getElementById('chat-box').innerHTML += "<div><i>[" + currentRoomId + "번 방에 연결되었습니다]</i></div>";

                stompClient.subscribe('/topic/chat/room/' + currentRoomId, function (chatMessage) {
                    const msg = JSON.parse(chatMessage.body);
                    const chatBox = document.getElementById('chat-box');
                    
                    let mediaHtml = "";
                    if (msg.messageType === 'IMAGE') {
                        mediaHtml = `<img src="http://localhost:8080${msg.fileUrl}" class="chat-media">`;
                    } else if (msg.messageType === 'VIDEO') {
                        mediaHtml = `<video src="http://localhost:8080${msg.fileUrl}" controls class="chat-media"></video>`;
                    } else if (msg.messageType === 'AUDIO') {
                        mediaHtml = `<audio src="http://localhost:8080${msg.fileUrl}" controls class="chat-media"></audio>`;
                    }

                    chatBox.innerHTML += `
                        <div class="message-box">
                            <b>${msg.senderNickname}</b>: ${msg.content} <small>(${msg.createdAt})</small>
                            ${mediaHtml}
                        </div>
                    `;
                });
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
            }
            console.log("Disconnected");
            document.getElementById('chat-box').innerHTML += "<div><i>[연결이 끊어졌습니다]</i></div>";
        }

        function sendMessage() {
            const content = document.getElementById('message').value;
            const senderId = document.getElementById('senderId').value;
            
            if (stompClient && content) {
                const chatMessage = {
                    roomId: currentRoomId,
                    senderId: senderId,
                    content: content,
                    messageType: "TEXT"
                };
                stompClient.send("/app/chat/message", {}, JSON.stringify(chatMessage));
                document.getElementById('message').value = '';
            } else {
                alert("연결이 안 되어 있거나 메시지가 없습니다.");
            }
        }

        // 파일 전송 로직 (HTTP POST 요청)
        async function sendFile() {
            const fileInput = document.getElementById('fileInput');
            const fileType = document.getElementById('fileType').value;
            const senderId = document.getElementById('senderId').value;

            if (!stompClient) {
                alert("먼저 채팅방에 연결해주세요.");
                return;
            }
            if (fileInput.files.length === 0) {
                alert("파일을 선택해주세요.");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("messageType", fileType);
            formData.append("senderId", senderId);

            try {
                // 일반 REST API로 파일을 업로드합니다.
                const response = await fetch(`http://localhost:8080/api/chats/${currentRoomId}/files`, {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    console.log("파일 업로드 성공 (알림은 웹소켓으로 자동 수신됨)");
                    fileInput.value = ""; // 입력창 초기화
                } else {
                    alert("파일 전송 실패");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
